<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransitLive | Real-Time Public Transport Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Google Maps JS API. Replace VITE_GOOGLE_MAPS_API_KEY in your .env file.
      Loaded here so the `google` global is available to MapView.jsx.
    -->
    <script>
      (function () {
        var key = '%VITE_GOOGLE_MAPS_API_KEY%';
        if (key && key !== '%VITE_GOOGLE_MAPS_API_KEY%') {
          var script = document.createElement('script');
          script.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=geometry';
          script.async = true;
          document.head.appendChild(script);
        }
      })();
    </script>
  </head>
  <body class="font-body bg-transit-fog">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
